name: Docker Image CI

on:
  workflow_dispatch: 
#  push:
#    branches: [ "master" ]

jobs:

  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build the Docker Compose Image
      run: |
        docker compose -f docker-compose.service.yml build trigger-py
        docker compose -f docker-compose.service.yml build data-wathering
        docker compose -f docker-compose.service.yml build data-weather
