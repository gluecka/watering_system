name: CI/CD Pipeline

on:
  push:
    branches: [ "master" ]


jobs:

  build-and-deploy:

    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:

    - name: Create .env file
      run: | # have to define secrets
        echo '${{ secrets.ENV_FILE }}' > .env 

    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Log in to GitHub Container Registry
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }} # have to define secret

    - name: Build and push first Image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: true
        tags: |
          ghcr.io/gluecka/py-trigger:latest
          ghcr.io/gluecka/py-trigger:$(date +%s)
    
