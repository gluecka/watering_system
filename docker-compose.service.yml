
services:
  grafana:
    container_name: grafana
    image: grafana/grafana
    ports:
      - '3000:3000'
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=${INFLUX_USER}
      - GF_SECURITY_ADMIN_PASSWORD=${INFLUX_PASSWORD}
    volumes:
      - ./Docker_volumes/grafana_storage:/var/lib/docker/volumes/grafana_storage
      - /etc/localtime:/etc/localtime:ro
    profiles: ['summer', 'winter']


  influxdb:
    container_name: influxdb
    image: influxdb:1.8
    ports:
      - '4000:8086'
    restart: always
    volumes:
      - ./Docker_volumes/influxdb_data:/var/lib/docker/volmees/influxdb_data
      - /etc/localtime:/etc/localtime:ro
    environment:
      - DOCKER_INFLUXDB_INIT_MODE=setup
      - DOCKER_INFLUXDB_USER=${INFLUX_USER}
      - DOCKER_INFLUXDB_PASSWORD=${INFLUX_PASSWORD}
      - DOCKER_INFLUXDB_DB=${INFLUX_DATABASE}
    profiles: ['summer', 'winter']     



  py-trigger:
    container_name: py-trigger
    image: ghcr.io/gluecka/py-trigger:1.0
#    build:
#      dockerfile: Dockerfile.trigger
    privileged: true
    restart: on-failure:3
    profiles: ['summer']


  data-wathering:
    container_name: py-data_wathering
    image: ghcr.io/gluecka/py-wathering:1.0
    privileged: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: on-failure:3
    depends_on:
      - influxdb
    profiles: ['summer']


  data-weather:
    container_name: py-data_weather
    image: ghcr.io/gluecka/py-weather:1.0
    privileged: true
    volumes:
      - /etc/localtime:/etc/localtime:ro
    restart: on-failure:3
    depends_on:
      - influxdb
    profiles: ['summer', 'winter']

